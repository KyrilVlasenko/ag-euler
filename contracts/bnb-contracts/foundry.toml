[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 20_000
evm_version = "cancun"
allow_paths = ["../../reference"]

fs_permissions = [{ access = "read-write", path = "./" }]

[rpc_endpoints]
bsc = "${RPC_URL_BSC}"

[etherscan]
bsc = { key = "${BSCSCAN_API_KEY}", url = "https://api.bscscan.com/api", chain = 56 }
